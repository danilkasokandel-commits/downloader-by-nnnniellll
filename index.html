<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NI3L DOWNLOADER</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins',sans-serif;
        }

        body {
            background: #050b16;
            color: white;
            padding-bottom: 80px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(10,20,40,.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #00aaff;
            box-shadow: 0 0 15px #00aaff;
        }

        .logo h2 {
            color: #00aaff;
        }

        .container {
            padding: 15px;
        }

        /* Banner */
        .slider {
            position: relative;
            height: 220px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: .5s;
        }

        .slide.active {
            opacity: 1;
        }

        /* Search */
        .search {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 15px;
            background: #0f1729;
            color: white;
            margin-bottom: 15px;
        }

        /* Info */
        .info {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-card {
            flex: 1;
            background: #0f1729;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(0,170,255,.2);
        }

        /* Tools */
        .tools {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 10px;
        }

        .card {
            background: #0f1729;
            border: 1px solid rgba(0,170,255,.2);
            padding: 15px;
            border-radius: 18px;
            transition: .2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card h3 {
            color: #00aaff;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .card button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg,#00c6ff,#0066ff);
            color: white;
            font-weight: bold;
        }

        /* Viewer */
        #viewer {
            margin-top: 15px;
            background: #0f1729;
            padding: 15px;
            border-radius: 18px;
            border: 1px solid rgba(0,170,255,.2);
        }

        /* Navbar */
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #08111f;
            display: flex;
            justify-content: space-around;
            padding: 12px;
            border-top: 1px solid rgba(0,170,255,.2);
        }

        .nav div {
            text-align: center;
            font-size: 13px;
        }

        /* Dark Mode */
        .light {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

    <header>

        <div class="logo">
            <img src="IMG_20260611_202350.jpg">
            <h2>Downloader</h2>
        </div>

        <button onclick="toggleTheme()">🌙</button>

    </header>

    <div class="container">

        <div class="slider">
            <img src="𝚛𝚊𝚋.jpeg" class="slide active">
            <img src="e2befacd-d5ae-4a11-b5e5-6efca7a6468d.jpeg" class="slide">
        </div>

        <input type="text" class="search" id="search" placeholder="Cari tools...">

        <div class="info">

            <div class="info-card">
                🕒
                <div id="clock">
                    00:00:00
                </div>
                <div id="date">
                    loading...
                </div>
                
            </div>


                <style>
                    .info {
                        position: fixed;
                        top: 20px;
                        right: 20px;

                        padding: 10px 16px;

                        border-radius: 14px;

                        background: rgba(15,23,42,.55);

                        backdrop-filter: blur(12px);

                        border: 1px solid rgba(255,255,255,.15);

                        color: white;

                        text-align: center;

                        box-shadow:
                        0 0 25px rgba(0,150,255,.25);

                        z-index: 9999;
                    }

                    #time {
                        font-size: 1.4rem;
                        font-weight: 600;
                        letter-spacing: 1px;
                    }

                    #date {
                        margin-top: 4px;
                        font-size: .9rem;
                        opacity: .8;
                    }
                </style>

                <script>

                    function updateClock() {

                        const now = new Date();

                        document.getElementById("time")
                        .textContent =
                        now.toLocaleTimeString("id-ID");

                        document.getElementById("date")
                        .textContent =
                        now.toLocaleDateString("id-ID", {
                            weekday: 'long',
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric'
                        });

                    }

                    setInterval(updateClock, 1000);

                    updateClock();

                </script>

            </div>

            <div class="info-card">
                ⚡
                <div>
                    ONLINE
                </div>
            </div>

        </div>

        <div class="tools" id="tools">

            <div class="card">
                <h3>📥 TikTok Downloader</h3>
                <button onclick="showTool('tiktok')">Buka</button>
            </div>

            <div class="card">
                <h3>▶️ YouTube Downloader</h3>
                <button onclick="showTool('youtube')">Buka</button>
            </div>

            <div class="card">
                <h3>📷 Instagram Downloader</h3>
                <button onclick="showTool('instagram')">Buka</button>
            </div>

            <div class="card">
                <h3>🎨 Render IQC</h3>
                <button onclick="showTool('iqc')">Buka</button>
            </div>

            <div class="card">
                <h3>🔳 QR Generator</h3>
                <button onclick="showTool('qr')">Buka</button>
            </div>

            <div class="card">
                <h3>🧮 Calculator</h3>
                <button onclick="showTool('calc')">Buka</button>
            </div>

        </div>

        <div id="viewer">
            <h3>Selamat Datang</h3>
            <p>
                Pilih tools yang ingin digunakan.
            </p>
        </div>

    </div>

    <div class="nav">
        <div>
            🏠<br>Home
        </div>
        <div>
            📥<br>Download
        </div>
        <div>
            ⚙️<br>Settings
        </div>
    </div>

    <script>


        /* Slider */
        const slides = document.querySelectorAll(".slide");
        let current = 0;

        setInterval(()=> {
            slides[current].classList.remove("active");
            current = (current+1)%slides.length;
            slides[current].classList.add("active");
        }, 3000);

        /* Jam & Tanggal */
        setInterval(()=> {

            const now = new Date();

            document.getElementById("clock").innerText =
            now.toLocaleTimeString("id-ID");

            document.getElementById("date").innerText =
            now.toLocaleDateString("id-ID", {
                weekday: "long",
                day: "numeric",
                month: "long",
                year: "numeric"
            });

        }, 1000);

        /* Search */
        document.getElementById("search").addEventListener("keyup", function() {

            let value = this.value.toLowerCase();

            document.querySelectorAll(".card").forEach(card => {

                card.style.display =
                card.innerText.toLowerCase().includes(value)
                ? "block": "none";

            });

        });

        /* Viewer */
        function showTool(tool) {

            let viewer = document.getElementById("viewer");

            if (tool === "tiktok") {
                viewer.innerHTML = `
                <h2>📥 TikTok Downloader</h2>

                <input id="tturl"
                placeholder="Tempel link TikTok di sini"
                style="width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;">

                <br><br>

                <button id="ttbtn"
                style="width:100%;padding:12px;border:none;border-radius:10px;background:#008cff;color:white;">
                Proses
                </button>

                <div id="ttresult" style="margin-top:15px;"></div>
                `;

                document.getElementById('ttbtn').onclick = async () => {
                    const url = document.getElementById('tturl').value.trim();
                    const result = document.getElementById('ttresult');

                    if (!url) {
                        result.innerHTML = 'Masukkan URL TikTok';
                        return;
                    }

                    result.innerHTML = 'Memproses...';

                    try {
                        const res = await fetch('https://api-faa.my.id/faa/tiktok?url=' + encodeURIComponent(url));
                        const data = await res.json();

                        const video =
                        data?.result?.data ||
                        data?.result?.video ||
                        data?.result?.url;

                        if (video) {
                            result.innerHTML = `
                            <video controls style="width:100%;border-radius:12px;" src="${video}"></video>
                            <br><br>
                            <a href="${video}" target="_blank">
                            <button style="width:100%;padding:12px;border:none;border-radius:10px;background:#00aa55;color:white;">
                            Download Video
                            </button>
                            </a>`;
                        } else {
                            result.innerHTML = 'Video tidak ditemukan dari API.';
                        }
                    } catch(e) {
                        result.innerHTML = 'Error: ' + e.message;
                    }
                };
                return;
            }

            if (tool === "qr") {

                viewer.innerHTML = `
                <h2>🔳 QR Generator</h2>

                <input
                id="qrtext"
                placeholder="Masukkan teks atau link"
                style="
                width:100%;
                padding:12px;
                border-radius:10px;
                border:none;
                ">

                <br><br>

                <button id="qrbtn"
                style="
                width:100%;
                padding:12px;
                border:none;
                border-radius:10px;
                background:linear-gradient(90deg,#00c6ff,#0066ff);
                color:white;
                font-weight:bold;
                ">
                Buat QR
                </button>

                <br><br>

                <div id="qrresult"></div>
                `;

                document.getElementById("qrbtn").onclick = () => {

                    const text =
                    document.getElementById("qrtext").value;

                    document.getElementById("qrresult").innerHTML = `
                    <img
                    src="https://quickchart.io/qr?text=${encodeURIComponent(text)}&size=300"
                    style="
                    width:300px;
                    max-width:100%;
                    border-radius:15px;
                    ">
                    `;

                };

                return;

            }

            if (tool === "calc") {

                viewer.innerHTML = `
                <h2>🧮 Calculator</h2>

                <input
                id="calcinput"
                placeholder="Contoh: 25*4+10"
                style="
                width:100%;
                padding:12px;
                border-radius:10px;
                border:none;
                ">

                <br><br>

                <button id="calcbtn"
                style="
                width:100%;
                padding:14px;
                border:none;
                border-radius:15px;
                background:linear-gradient(135deg,#00c6ff,#0066ff);
                color:white;
                font-size:16px;
                font-weight:bold;
                cursor:pointer;
                box-shadow:0 4px 15px rgba(0,170,255,.3);
                transition:.3s;
                ">
                🧮 Hitung Sekarang
                </button>

                <h3 id="calcresult"
                style="margin-top:15px;"></h3>
                `;

                document.getElementById("calcbtn").onclick = () => {

                    try {

                        document.getElementById("calcresult")
                        .innerText =
                        eval(
                            document.getElementById("calcinput").value
                        );

                    }catch {

                        document.getElementById("calcresult")
                        .innerText =
                        "Input tidak valid";

                    }

                };

                return;
            }

            if (tool === "youtube") {

                viewer.innerHTML = `
                <div style="
                text-align:center;
                padding:40px;
                ">

                <h1 style="font-size:70px;">▶️</h1>

                <h2>YouTube Downloader</h2>

                <p style="
                opacity:.7;
                margin-top:10px;
                ">
                🚧 COMING SOON 🚧
                </p>

                </div>
                `;

                return;

            }

            if (tool === "instagram") {

                viewer.innerHTML = `
                <div style="
                text-align:center;
                padding:40px;
                ">

                <h1 style="font-size:70px;">📷</h1>

                <h2>Instagram Downloader</h2>

                <p style="
                opacity:.7;
                margin-top:10px;
                ">
                🚧 COMING SOON 🚧
                </p>

                </div>
                `;

                return;

            }

            if (tool === "iqc") {

                viewer.innerHTML = `
                <div style="
                text-align:center;
                padding:40px;
                ">

                <h1 style="font-size:70px;">🎨</h1>

                <h2>Render IQC</h2>

                <p style="
                opacity:.7;
                margin-top:10px;
                ">
                🚧 COMING SOON 🚧
                </p>

                </div>
                `;

                return;

            }

            viewer.innerHTML = `
            <h2>${tool.toUpperCase()}</h2>

            <input
            placeholder="Tempel link di sini"
            style="
            width:100%;
            padding:12px;
            margin-top:10px;
            border-radius:10px;
            border:none;
            ">

            <br><br>

            <button
            style="
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#008cff;
            color:white;
            ">
            Proses
            </button>
            `;
        }

        /* Theme */
        function toggleTheme() {
            document.body.classList.toggle("light");
        }

    </script>

    <div class="container">
        ...
    </div>

    <footer
        style="
        text-align:center;
        padding:20px;
        margin-top:20px;
        color:#8aa;
        font-size:14px;
        ">
        © 2026 Niell Downloader. All Rights Reserved
    </footer>

</body>
  </html>
